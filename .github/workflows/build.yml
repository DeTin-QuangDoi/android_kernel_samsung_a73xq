name: Samsung A73 Optimized Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_tool_cache: true

      - name: Install Deps
        run: |
          sudo apt update
          sudo apt install -y bc build-essential libssl-dev libelf-dev clang lld llvm libtinfo5

      - name: Fetch Legacy Toolchain
        run: |
          mkdir -p toolchain/gcc/linux-x86/aarch64
          mkdir -p toolchain/llvm-arm-toolchain-ship/10.0
           
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 -b lineage-18.1 \
          toolchain/gcc/linux-x86/aarch64/aarch64-linux-android-4.9
          
          aria2c -x 16 -s 16 -o "clang.tar.gz" "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r353983c.tar.gz"
          tar -xf clang.tar.gz -C toolchain/llvm-arm-toolchain-ship/10.0
          rm clang.tar.gz

      - name: Build
        run: |
          chmod +x build_kernel.sh
          ./build_kernel.sh
        env:
          KBUILD_BUILD_USER: "Lixin"
          KBUILD_BUILD_HOST: "GitHub-Actions"

