name: Vanilla Build

on:
  workflow_dispatch: 
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev \
          ccache libncurses-dev python3 git-lfs gcc-aarch64-linux-gnu clang lld llvm

      - name: Setup Toolchain Symlinks
        run: |
          # Tạo cấu trúc thư mục mà build_kernel.sh yêu cầu
          mkdir -p toolchain/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/bin
          mkdir -p toolchain/llvm-arm-toolchain-ship/10.0/bin
          
          # Liên kết GCC từ hệ thống vào đường dẫn script mong đợi
          ln -s /usr/bin/aarch64-linux-gnu-gcc toolchain/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/bin/aarch64-linux-android-gcc
          ln -s /usr/bin/aarch64-linux-gnu-ld toolchain/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/bin/aarch64-linux-android-ld
          ln -s /usr/bin/aarch64-linux-gnu-objcopy toolchain/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/bin/aarch64-linux-android-objcopy
          
          # Liên kết Clang
          ln -s /usr/bin/clang toolchain/llvm-arm-toolchain-ship/10.0/bin/clang

      - name: Build Kernel
        run: |
          chmod +x build_kernel.sh
          ./build_kernel.sh
        env:
          KBUILD_BUILD_USER: "Lixin"
          KBUILD_BUILD_HOST: "GitHub-Actions"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Samsung-A73-Kernel-Files
          path: |
            out/arch/arm64/boot/Image
            out/arch/arm64/boot/dts/samsung/*.dtb
            out/arch/arm64/boot/dtbo.img

